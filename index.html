<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Are You Safe? — OIMA Check-In</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --ink: #1a2733;
    --muted: #5c6b7a;
    --line: #e2e8f0;
    --brand: #1f5c8b;
    --brand-dark: #164b73;
    --safe: #1f9d55;
    --safe-bg: #e6f6ec;
    --help: #d64545;
    --help-bg: #fbeaea;
    --pending: #b0791f;
    --pending-bg: #fdf3e2;
    --shadow: 0 1px 3px rgba(16,32,48,.08), 0 6px 20px rgba(16,32,48,.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  header.app {
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    color: #fff;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .head-row { display: flex; align-items: center; gap: 14px; max-width: 1080px; margin: 0 auto; flex-wrap: wrap; }
  .head-mark {
    width: 42px; height: 42px; border-radius: 10px; background: rgba(255,255,255,.15);
    display: grid; place-items: center; font-size: 22px; flex: none;
  }
  .head-title { flex: 1 1 240px; min-width: 0; }
  .head-title h1 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: .2px; }
  .head-title .event { margin: 2px 0 0; font-size: 13px; opacity: .9; }
  .head-title .event b { font-weight: 600; }
  .sync-badge {
    font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 20px; white-space: nowrap;
    background: rgba(255,255,255,.16); align-self: center;
  }
  .sync-badge.live::before { content: "● "; color: #7ee2a8; }
  .sync-badge.local::before { content: "● "; color: #ffd27a; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 18px 20px 60px; }

  .banner {
    background: var(--pending-bg); color: #7a5512; border: 1px solid #f0d8a8;
    border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
  }
  .banner b { font-weight: 700; }
  .banner.err { background: var(--help-bg); color: #8f2b2b; border-color: #f0bcbc; }

  /* Summary bar */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 4px 0 18px; }
  .stat {
    background: var(--card); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow);
    border: 1px solid var(--line); text-align: center;
  }
  .stat .num { font-size: 26px; font-weight: 800; line-height: 1; }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .stat.total .num { color: var(--brand); }
  .stat.safe .num { color: var(--safe); }
  .stat.help .num { color: var(--help); }
  .stat.pending .num { color: var(--pending); }

  .progress { height: 8px; border-radius: 6px; background: var(--line); overflow: hidden; display: flex; margin-bottom: 18px; }
  .progress > span { display: block; height: 100%; }
  .progress .p-safe { background: var(--safe); }
  .progress .p-help { background: var(--help); }

  /* Controls */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .search { flex: 1 1 220px; position: relative; }
  .search input {
    width: 100%; padding: 10px 12px 10px 34px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 15px; background: var(--card);
  }
  .search::before { content: "🔍"; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: .6; }
  .reporter { position: relative; flex: 0 1 190px; }
  .reporter input {
    width: 100%; padding: 10px 12px; border: 1px dashed var(--line); border-radius: 10px;
    font-size: 14px; background: var(--card);
  }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    padding: 8px 13px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  /* Roster */
  .group-head {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); margin: 20px 4px 8px; display: flex; align-items: center; gap: 8px;
  }
  .group-head .g-count { font-weight: 600; opacity: .8; }
  .person {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
    box-shadow: var(--shadow); margin-bottom: 10px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    border-left: 5px solid var(--line);
  }
  .person.s-safe { border-left-color: var(--safe); }
  .person.s-help { border-left-color: var(--help); }
  .person.s-pending { border-left-color: var(--pending); }
  .p-main { flex: 1 1 220px; min-width: 0; }
  .p-name { font-weight: 700; font-size: 15.5px; }
  .p-meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .p-note { font-size: 12.5px; color: var(--muted); margin-top: 6px; font-style: italic; display: none; }
  .p-note.show { display: block; }
  .p-time { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .btns { display: flex; gap: 6px; flex: none; }
  .sbtn {
    border: 1.5px solid var(--line); background: var(--card); color: var(--muted);
    padding: 8px 12px; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .sbtn.safe.on { background: var(--safe-bg); color: var(--safe); border-color: var(--safe); }
  .sbtn.help.on { background: var(--help-bg); color: var(--help); border-color: var(--help); }
  .note-btn { background: none; border: none; color: var(--brand); font-size: 12px; cursor: pointer; padding: 8px 4px; font-weight: 600; }

  /* Admin */
  .admin-toggle {
    position: fixed; bottom: 18px; right: 18px; z-index: 30;
    background: var(--ink); color: #fff; border: none; border-radius: 24px; padding: 11px 18px;
    font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  .admin-panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow);
    padding: 18px; margin-bottom: 20px; display: none;
  }
  .admin-panel.open { display: block; }
  .admin-panel h2 { margin: 0 0 4px; font-size: 16px; }
  .admin-panel .hint { font-size: 12.5px; color: var(--muted); margin: 0 0 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
  .field input { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; font-size: 15px; }
  .admin-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .admin-row .field { flex: 1 1 200px; }
  .abtns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .btn {
    border: none; border-radius: 10px; padding: 11px 16px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn.primary { background: var(--brand); color: #fff; }
  .btn.ghost { background: #eef2f6; color: var(--ink); }
  .btn.danger { background: var(--help-bg); color: var(--help); }
  .btn.save { background: var(--safe); color: #fff; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .versions { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px; }
  .versions h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .ver { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; flex-wrap: wrap; }
  .ver .v-name { font-weight: 700; flex: 1 1 160px; }
  .ver .v-name .tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--safe); margin-left: 6px; }
  .ver .v-stat { color: var(--muted); font-size: 12px; }
  .link-btn { background: none; border: none; color: var(--brand); font-weight: 600; cursor: pointer; padding: 4px 6px; font-size: 12px; }
  .link-btn.del { color: var(--help); }
  .empty-note { color: var(--muted); font-size: 13px; font-style: italic; }

  .toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 14px;
    opacity: 0; transition: all .25s; pointer-events: none; z-index: 50; box-shadow: 0 4px 14px rgba(0,0,0,.3); max-width: 90%;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Passcode gate */
  .gate {
    position: fixed; inset: 0; z-index: 100; background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .gate.show { display: flex; }
  .gate-card {
    background: var(--card); border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.3);
    padding: 30px 26px; width: 100%; max-width: 360px; text-align: center;
  }
  .gate-card .g-mark { font-size: 40px; }
  .gate-card h2 { margin: 8px 0 4px; font-size: 20px; }
  .gate-card p { margin: 0 0 18px; color: var(--muted); font-size: 13.5px; }
  .gate-card input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 16px; text-align: center; letter-spacing: 2px; margin-bottom: 12px;
  }
  .gate-card .btn { width: 100%; }
  .gate-err { color: var(--help); font-size: 13px; min-height: 18px; margin-top: 10px; font-weight: 600; }

  @media (max-width: 560px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .person { gap: 10px; }
    .btns { flex: 1 1 100%; }
    .sbtn { flex: 1; text-align: center; }
    .reporter { flex: 1 1 100%; }
  }
</style>

<!-- Passcode gate (shared mode only) -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="g-mark">🛟</div>
    <h2>Office Check-In</h2>
    <p>Enter the office passcode to open the safety board.</p>
    <input id="gateInput" type="password" inputmode="text" placeholder="Passcode" autocomplete="current-password">
    <button class="btn primary" id="gateBtn">Enter</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<header class="app">
  <div class="head-row">
    <div class="head-mark">🛟</div>
    <div class="head-title">
      <h1>Are You Safe? — Employee Check-In</h1>
      <p class="event">Event: <b id="hEvent">—</b> &nbsp;·&nbsp; <span id="hDate">—</span></p>
    </div>
    <span class="sync-badge local" id="syncBadge">Local</span>
  </div>
</header>

<div class="wrap">
  <div id="banner"></div>

  <div class="admin-panel" id="adminPanel">
    <h2>Admin controls</h2>
    <p class="hint" id="adminHint">Set the current event, save a snapshot, or start a new event.</p>
    <div class="admin-row">
      <div class="field">
        <label>Event name</label>
        <input id="aEvent" type="text" placeholder="e.g. Gas leak at CalEPA HQ">
      </div>
      <div class="field">
        <label>Event date</label>
        <input id="aDate" type="date">
      </div>
    </div>
    <div class="abtns">
      <button class="btn primary" id="applyEvent">Update event</button>
      <button class="btn save" id="saveVersion">💾 Save this version</button>
      <button class="btn ghost" id="exportBtn">⬇ Export JSON</button>
      <button class="btn danger" id="resetBtn">↺ Archive &amp; new event</button>
    </div>

    <div class="versions">
      <h3>Saved versions</h3>
      <div id="versionList"></div>
    </div>
  </div>

  <div class="summary">
    <div class="stat total"><div class="num" id="cTotal">0</div><div class="lbl">Roster</div></div>
    <div class="stat safe"><div class="num" id="cSafe">0</div><div class="lbl">Safe</div></div>
    <div class="stat help"><div class="num" id="cHelp">0</div><div class="lbl">Needs help</div></div>
    <div class="stat pending"><div class="num" id="cPending">0</div><div class="lbl">No response</div></div>
  </div>
  <div class="progress" id="progress">
    <span class="p-safe" style="width:0"></span>
    <span class="p-help" style="width:0"></span>
  </div>

  <div class="controls">
    <div class="search"><input id="search" type="text" placeholder="Search name, unit, or title…"></div>
    <div class="reporter"><input id="reporter" type="text" placeholder="Reporting as… (your name)"></div>
    <div class="filters">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="pending">No response</button>
      <button class="chip" data-filter="safe">Safe</button>
      <button class="chip" data-filter="help">Needs help</button>
    </div>
  </div>

  <div id="roster"></div>
</div>

<button class="admin-toggle" id="adminToggle">⚙ Admin</button>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---- Roster (from OIMA employee master, vacant positions excluded) ----
const ROSTER = [
  ["Greg Gearheart","Executive","CEA A, Director"],
  ["Andrew Hamilton","Management","Environmental Program Manager I (Sup)"],
  ["Kiranpreet (Kiran) Kaur","Data Integration and Analysis","Senior WRC Engineer (Sup.)"],
  ["Allysen Calalang","Data Integration and Analysis","WRC Engineer"],
  ["Julius Choi","Data Integration and Analysis","WRC Engineer"],
  ["David Altare","Data Integration and Analysis","WRC Engineer"],
  ["Swarnalakshmi (Swarna) Gopalarathnam","Data Integration and Analysis","Research Data Specialist III"],
  ["Ranita Prasad","Quality Assurance","Senior Environmental Scientist (Spec)"],
  ["Annarose Holder","Data and Equity","Sr. Environmental Scientist (Spec)"],
  ["Marisa Van Dyke","Harmful Algal Bloom Program","Senior Environmental Scientist (Spec)"],
  ["Carly Nilson","Harmful Algal Bloom Program","Senior Environmental Scientist (Spec)"],
  ["Chad Fearing","Contracts/Budgets","Analyst II"],
  ["Sarah Guest","Contracts/Budgets","Analyst II"],
  ["Tessa Fojut","QA/Data Management","Senior Environmental Scientist (Sup)"],
  ["Jennifer Salisbury","QA/Data Management","Environmental Scientist"],
  ["Toni Marshall","QA/Data Management","Environmental Scientist"],
  ["James “Tony” Gill","QA/Data Management","Environmental Scientist"],
  ["Keenan Smith","QA/Data Management","Environmental Scientist"],
  ["Candice Heinz","QA/Data Management","Environmental Scientist"],
  ["Alyssa Crabbe","QA/Data Management","Scientific Aid"],
  ["Kimberly Pham","QA/Data Management","Environmental Scientist"],
  ["Alexandria Dunn","SWAMP Unit","Senior Environmental Scientist (Sup)"],
  ["Elena Suglia","SWAMP Unit","Environmental Scientist"],
  ["Felisha Walls","SWAMP Unit","Environmental Scientist"],
  ["Michelle Tang","SWAMP Unit","Research Data Specialist III"],
  ["Lindsey Metz","SWAMP Unit","Environmental Scientist"],
  ["Devan Burke","SWAMP Unit","Environmental Scientist"],
  ["Laura Webber","Monitoring Council","Environmental Program Manager I (Spec)"],
  ["Erickson Burres","Clean Water Team","Sr. Environmental Scientist (Spec)"],
  ["Patricia Orosz","Administrative Support","Office Technician (T)"]
].map((r,i) => ({ id: i, name: r[0], unit: r[1], title: r[2] }));
const TOTAL = ROSTER.length;

// ---- Mode detection --------------------------------------------------------
const CFG = window.SAFECHECK_CONFIG || {};
const CLOUD = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && !/YOUR-|example\./i.test(CFG.SUPABASE_URL));
let MODE = CLOUD ? "cloud" : "local";
let sb = null;

// ---- Shared in-memory state ------------------------------------------------
let ACTIVE = null;                 // { id, name, date }
let responses = {};                // employee_id -> { status, note, ts, by }
let filter = "all";
let query = "";
let channel = null;

const LOCAL_STATE_KEY = "oima_safecheck_state_v1";
const LOCAL_VER_KEY   = "oima_safecheck_versions_v1";
const REPORTER_KEY    = "oima_safecheck_reporter";

function resp(id) { return responses[id] || { status: "pending", note: "", ts: "", by: "" }; }
function reporterName() { return (document.getElementById("reporter").value || "").trim(); }
function fmtTs(iso) {
  if (!iso) return "";
  try { return new Date(iso).toLocaleString(undefined, { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" }); }
  catch(e) { return ""; }
}
function fmtDate(iso) {
  if (!iso) return "—";
  const [y,m,d] = String(iso).split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined, { weekday:"short", year:"numeric", month:"long", day:"numeric" });
}

// ===========================================================================
//  DATA LAYER — same interface, two implementations (local + cloud)
// ===========================================================================
const Store = {
  async init() {
    if (MODE === "cloud") return this.cloudInit();
    return this.localInit();
  },

  // ---------- LOCAL ----------
  localInit() {
    let s = null;
    try { s = JSON.parse(localStorage.getItem(LOCAL_STATE_KEY)); } catch(e) {}
    if (!s || s.event === undefined) s = { event: "Gas leak at CalEPA HQ", date: "2026-07-14", responses: {} };
    ACTIVE = { id: "local", name: s.event, date: s.date };
    responses = s.responses || {};
  },
  localSave() {
    localStorage.setItem(LOCAL_STATE_KEY, JSON.stringify({ event: ACTIVE.name, date: ACTIVE.date, responses }));
  },

  // ---------- CLOUD ----------
  async cloudInit() {
    const { data, error } = await sb.from("events")
      .select("*").eq("status", "active").order("created_at", { ascending: false }).limit(1);
    if (error) throw error;
    if (data && data.length) {
      ACTIVE = { id: data[0].id, name: data[0].name, date: data[0].event_date };
    } else {
      ACTIVE = null;   // admin must start one
    }
    await this.cloudRefresh();
    this.cloudSubscribe();
  },
  async cloudRefresh() {
    responses = {};
    if (!ACTIVE) return;
    const { data, error } = await sb.from("responses").select("*").eq("event_id", ACTIVE.id);
    if (error) { toast("Load error: " + error.message); return; }
    (data || []).forEach(r => {
      responses[r.employee_id] = { status: r.status, note: r.note || "", ts: fmtTs(r.updated_at), by: r.updated_by || "" };
    });
  },
  cloudSubscribe() {
    if (channel) { sb.removeChannel(channel); channel = null; }
    if (!ACTIVE) return;
    channel = sb.channel("rt-" + ACTIVE.id)
      .on("postgres_changes",
        { event: "*", schema: "public", table: "responses", filter: "event_id=eq." + ACTIVE.id },
        async () => { await this.cloudRefresh(); renderSummary(); renderRoster(); })
      .subscribe();
  },

  // ---------- shared operations ----------
  async setStatus(id, status, note) {
    const r = resp(id);
    const noteVal = note !== undefined ? note : r.note;
    const iso = new Date().toISOString();
    // optimistic local update
    responses[id] = { status, note: noteVal || "", ts: status === "pending" && !noteVal ? "" : fmtTs(iso), by: reporterName() };
    renderSummary(); renderRoster();

    if (MODE === "local") { this.localSave(); return; }

    const emp = ROSTER[id];
    const row = {
      event_id: ACTIVE.id, employee_id: id, employee_name: emp.name, unit: emp.unit, title: emp.title,
      status, note: noteVal || "", updated_at: iso, updated_by: reporterName()
    };
    const { error } = await sb.from("responses").upsert(row, { onConflict: "event_id,employee_id" });
    if (error) toast("Save failed: " + error.message);
  },

  async updateMeta(name, date) {
    if (MODE === "cloud" && ACTIVE) {
      const { error } = await sb.from("events").update({ name, event_date: date }).eq("id", ACTIVE.id);
      if (error) { toast("Error: " + error.message); return; }
    }
    ACTIVE.name = name; ACTIVE.date = date;
    if (MODE === "local") this.localSave();
  },

  async newEvent(name, date) {
    if (MODE === "local") {
      // snapshot current into versions, then reset
      this.localPushVersion();
      ACTIVE = { id: "local", name, date };
      responses = {};
      this.localSave();
      return;
    }
    if (ACTIVE) await sb.from("events").update({ status: "archived" }).eq("id", ACTIVE.id);
    const { data, error } = await sb.from("events").insert({ name, event_date: date, status: "active" }).select().single();
    if (error) { toast("Error: " + error.message); return; }
    ACTIVE = { id: data.id, name: data.name, date: data.event_date };
    responses = {};
    this.cloudSubscribe();
  },

  // ---------- versions ----------
  localPushVersion() {
    const versions = this.localVersions();
    versions.push(this.snapshotObj());
    localStorage.setItem(LOCAL_VER_KEY, JSON.stringify(versions));
  },
  localVersions() {
    try { return JSON.parse(localStorage.getItem(LOCAL_VER_KEY)) || []; } catch(e) { return []; }
  },
  async listVersions() {
    if (MODE === "local") {
      return this.localVersions().slice().reverse().map(v => ({
        id: v.savedAt, name: v.event, date: v.date,
        safe: v.counts.safe, help: v.counts.help, pending: v.counts.pending, active: false, _local: v
      }));
    }
    const { data, error } = await sb.from("event_summary").select("*").order("created_at", { ascending: false });
    if (error) { toast("Error: " + error.message); return []; }
    return (data || []).map(e => ({
      id: e.id, name: e.name, date: e.event_date,
      safe: +e.safe, help: +e.help, pending: TOTAL - (+e.safe) - (+e.help),
      active: e.status === "active"
    }));
  },
  async saveVersionNow() {
    // Local: explicit snapshot. Cloud: data already persists, so just export.
    if (MODE === "local") { this.localPushVersion(); return true; }
    return false;
  },
  async fetchSnapshot(v) {
    // build a full 30-person snapshot object for download
    if (MODE === "local" && v && v._local) return v._local;
    if (MODE === "local") return this.snapshotObj();
    // cloud: pull responses for the event id
    let rmap = {};
    if (v && v.id) {
      const { data } = await sb.from("responses").select("*").eq("event_id", v.id);
      (data || []).forEach(r => { rmap[r.employee_id] = r; });
    } else {
      ROSTER.forEach(p => { const r = resp(p.id); if (r.status !== "pending" || r.note) rmap[p.id] = r; });
    }
    const meta = v || ACTIVE;
    return {
      event: meta.name, date: meta.date, savedAt: new Date().toISOString(),
      counts: v ? { safe: v.safe, help: v.help, pending: v.pending, total: TOTAL } : counts(),
      roster: ROSTER.map(p => {
        const r = rmap[p.id] || {};
        return { name: p.name, unit: p.unit, title: p.title,
                 status: r.status || "pending", note: r.note || "", updated: r.updated_at ? fmtTs(r.updated_at) : (r.ts || ""), by: r.updated_by || r.by || "" };
      })
    };
  },
  snapshotObj() {
    return {
      event: ACTIVE.name, date: ACTIVE.date, savedAt: new Date().toISOString(), counts: counts(),
      roster: ROSTER.map(p => { const r = resp(p.id); return {
        name: p.name, unit: p.unit, title: p.title, status: r.status, note: r.note, updated: r.ts, by: r.by }; })
    };
  },
  async deleteVersion(v) {
    if (MODE === "local") {
      const versions = this.localVersions().filter(x => x.savedAt !== v.id);
      localStorage.setItem(LOCAL_VER_KEY, JSON.stringify(versions));
      return;
    }
    if (v.active) { toast("Can't delete the active event."); return; }
    const { error } = await sb.from("events").delete().eq("id", v.id);
    if (error) toast("Error: " + error.message);
  }
};

// ===========================================================================
//  RENDERING
// ===========================================================================
function counts() {
  let safe=0, help=0;
  ROSTER.forEach(p => { const s = resp(p.id).status; if (s==="safe") safe++; else if (s==="help") help++; });
  return { safe, help, pending: TOTAL - safe - help, total: TOTAL };
}

function renderHeader() {
  document.getElementById("hEvent").textContent = ACTIVE ? (ACTIVE.name || "(unnamed event)") : "No active event";
  document.getElementById("hDate").textContent = ACTIVE ? fmtDate(ACTIVE.date) : "—";
  const badge = document.getElementById("syncBadge");
  if (MODE === "cloud") { badge.className = "sync-badge live"; badge.textContent = "Live · shared"; }
  else { badge.className = "sync-badge local"; badge.textContent = "Local only"; }
}

function renderSummary() {
  const c = counts();
  document.getElementById("cTotal").textContent = c.total;
  document.getElementById("cSafe").textContent = c.safe;
  document.getElementById("cHelp").textContent = c.help;
  document.getElementById("cPending").textContent = c.pending;
  const prog = document.getElementById("progress");
  prog.querySelector(".p-safe").style.width = (c.safe/c.total*100) + "%";
  prog.querySelector(".p-help").style.width = (c.help/c.total*100) + "%";
}

function matches(p) {
  const s = resp(p.id).status;
  if (filter !== "all" && s !== filter) return false;
  if (query) {
    const hay = (p.name + " " + p.unit + " " + p.title).toLowerCase();
    if (!hay.includes(query)) return false;
  }
  return true;
}

function renderRoster() {
  const root = document.getElementById("roster");
  root.innerHTML = "";
  if (!ACTIVE) {
    root.innerHTML = '<p class="empty-note">No active event. Open <b>⚙ Admin</b> to start one.</p>';
    return;
  }
  const visible = ROSTER.filter(matches);
  if (!visible.length) { root.innerHTML = '<p class="empty-note">No one matches the current search or filter.</p>'; return; }

  const groups = [], idx = {};
  visible.forEach(p => {
    if (!(p.unit in idx)) { idx[p.unit] = groups.length; groups.push({ unit: p.unit, people: [] }); }
    groups[idx[p.unit]].people.push(p);
  });

  groups.forEach(g => {
    const gh = document.createElement("div");
    gh.className = "group-head";
    gh.innerHTML = `${g.unit} <span class="g-count">· ${g.people.length}</span>`;
    root.appendChild(gh);

    g.people.forEach(p => {
      const r = resp(p.id);
      const el = document.createElement("div");
      el.className = "person s-" + r.status;
      const stamp = r.ts ? ("Updated " + r.ts + (r.by ? " · by " + r.by : "")) : "";
      el.innerHTML = `
        <div class="p-main">
          <div class="p-name"></div>
          <div class="p-meta"></div>
          <div class="p-note ${r.note ? "show":""}"></div>
          <div class="p-time"></div>
        </div>
        <div class="btns">
          <button class="sbtn safe ${r.status==="safe"?"on":""}" data-act="safe">✓ Safe</button>
          <button class="sbtn help ${r.status==="help"?"on":""}" data-act="help">⚠ Needs help</button>
        </div>
        <button class="note-btn" data-act="note">＋ Note</button>`;
      el.querySelector(".p-name").textContent = p.name;
      el.querySelector(".p-meta").textContent = p.title;
      el.querySelector(".p-time").textContent = stamp;
      if (r.note) el.querySelector(".p-note").textContent = "“" + r.note + "”";

      el.querySelectorAll("[data-act]").forEach(b => {
        b.addEventListener("click", () => {
          const act = b.dataset.act;
          if (act === "note") { addNote(p.id); return; }
          const cur = resp(p.id).status;
          Store.setStatus(p.id, cur === act ? "pending" : act);
        });
      });
      root.appendChild(el);
    });
  });
}

function addNote(id) {
  const r = resp(id), p = ROSTER[id];
  const note = prompt("Note for " + p.name + " (location, condition, etc.):", r.note || "");
  if (note === null) return;
  Store.setStatus(id, r.status || "pending", note.trim());
}

// ---- Versions UI ----
async function renderVersions() {
  const list = document.getElementById("versionList");
  const versions = await Store.listVersions();
  if (!versions.length) { list.innerHTML = '<p class="empty-note">No saved versions yet.</p>'; return; }
  list.innerHTML = "";
  versions.forEach(v => {
    const row = document.createElement("div");
    row.className = "ver";
    row.innerHTML = `
      <span class="v-name"></span>
      <span class="v-stat">${v.safe} safe · ${v.help} help · ${v.pending} no response</span>
      <button class="link-btn" data-act="dl">Download</button>
      <button class="link-btn del" data-act="del">Delete</button>`;
    const nameEl = row.querySelector(".v-name");
    nameEl.textContent = `${v.name} — ${fmtDate(v.date)}`;
    if (v.active) { const t = document.createElement("span"); t.className = "tag"; t.textContent = "active"; nameEl.appendChild(t); }
    row.querySelector('[data-act="dl"]').addEventListener("click", async () => downloadObj(await Store.fetchSnapshot(v)));
    row.querySelector('[data-act="del"]').addEventListener("click", async () => {
      if (!confirm("Delete this saved version?")) return;
      await Store.deleteVersion(v); renderVersions();
    });
    list.appendChild(row);
  });
}

function downloadObj(obj) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const safeName = (obj.event || "event").replace(/[^a-z0-9]+/gi, "-").toLowerCase();
  a.download = `safecheck-${safeName}-${(obj.date||"")}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===========================================================================
//  ADMIN ACTIONS
// ===========================================================================
async function applyEvent() {
  const name = document.getElementById("aEvent").value.trim();
  const date = document.getElementById("aDate").value;
  if (!ACTIVE) { return newEventFromFields(); }
  await Store.updateMeta(name, date);
  renderHeader(); renderVersions();
  toast("Event updated");
}

async function newEventFromFields() {
  const name = document.getElementById("aEvent").value.trim();
  const date = document.getElementById("aDate").value;
  if (!name) { toast("Enter an event name first."); return; }
  await Store.newEvent(name, date);
  renderHeader(); renderSummary(); renderRoster(); renderVersions();
  toast("New event started");
}

async function resetTool() {
  const msg = MODE === "cloud"
    ? "Archive the current event and start a new one?\n\nCurrent responses stay saved under “Saved versions.”"
    : "Save the current responses as a version and start a new event?";
  if (!confirm(msg)) return;
  const name = prompt("New event name:", "");
  if (name === null) return;
  const date = prompt("New event date (YYYY-MM-DD):", ACTIVE ? ACTIVE.date : "");
  if (date === null) return;
  await Store.newEvent(name.trim(), date.trim());
  document.getElementById("aEvent").value = ACTIVE.name;
  document.getElementById("aDate").value = ACTIVE.date;
  renderHeader(); renderSummary(); renderRoster(); renderVersions();
  toast("New event started");
}

async function saveVersion() {
  const did = await Store.saveVersionNow();
  renderVersions();
  if (did) toast("Version saved");
  else { downloadObj(await Store.fetchSnapshot(null)); toast("Responses are auto-saved — exported a copy"); }
}

// ===========================================================================
//  MISC / WIRING
// ===========================================================================
let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

function showBanner(html, isErr) {
  const b = document.getElementById("banner");
  b.innerHTML = `<div class="banner ${isErr?"err":""}">${html}</div>`;
}

function wire() {
  document.getElementById("adminToggle").addEventListener("click", () => {
    const panel = document.getElementById("adminPanel");
    panel.classList.toggle("open");
    if (panel.classList.contains("open")) {
      document.getElementById("aEvent").value = ACTIVE ? ACTIVE.name : "";
      document.getElementById("aDate").value = ACTIVE ? ACTIVE.date : "";
      renderVersions();
      panel.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  });
  document.getElementById("applyEvent").addEventListener("click", applyEvent);
  document.getElementById("saveVersion").addEventListener("click", saveVersion);
  document.getElementById("exportBtn").addEventListener("click", async () => downloadObj(await Store.fetchSnapshot(null)));
  document.getElementById("resetBtn").addEventListener("click", resetTool);

  document.getElementById("search").addEventListener("input", e => { query = e.target.value.trim().toLowerCase(); renderRoster(); });
  document.querySelectorAll(".chip").forEach(ch => {
    ch.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
      ch.classList.add("active"); filter = ch.dataset.filter; renderRoster();
    });
  });

  const rep = document.getElementById("reporter");
  rep.value = localStorage.getItem(REPORTER_KEY) || "";
  rep.addEventListener("input", () => localStorage.setItem(REPORTER_KEY, rep.value));

  // In cloud mode, hide the "Save this version" button (data auto-saves).
  if (MODE === "cloud") document.getElementById("saveVersion").style.display = "none";
}

// ---- Passcode gate (cloud only) ----
function showGate() {
  return new Promise(resolve => {
    const gate = document.getElementById("gate");
    const input = document.getElementById("gateInput");
    const btn = document.getElementById("gateBtn");
    const err = document.getElementById("gateErr");
    gate.classList.add("show");
    input.focus();
    async function attempt() {
      err.textContent = ""; btn.disabled = true; btn.textContent = "Checking…";
      const { error } = await sb.auth.signInWithPassword({ email: CFG.SHARED_EMAIL, password: input.value });
      btn.disabled = false; btn.textContent = "Enter";
      if (error) { err.textContent = "Incorrect passcode."; input.select(); return; }
      gate.classList.remove("show"); resolve(true);
    }
    btn.addEventListener("click", attempt);
    input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
  });
}

// ===========================================================================
//  BOOT
// ===========================================================================
(async function boot() {
  renderHeader();
  if (MODE === "cloud") {
    if (!window.supabase) {
      MODE = "local";
      showBanner("Couldn't load the cloud library (offline?). Running in <b>local-only</b> mode.", true);
    } else {
      sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
      const { data: { session } } = await sb.auth.getSession();
      if (!session) await showGate();
    }
  }

  try {
    await Store.init();
  } catch (e) {
    showBanner("Backend error: " + (e.message || e) + ". Check config.js and that the schema was created.", true);
  }

  wire();
  renderHeader(); renderSummary(); renderRoster();

  if (MODE === "local") {
    showBanner("<b>Local mode.</b> Responses are saved only in this browser. Add your Supabase keys in <code>config.js</code> to share across devices (see SETUP.md).");
  }
})();
</script>
